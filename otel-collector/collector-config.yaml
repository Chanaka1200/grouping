receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  resource:
    attributes:
      - key: environment
        value: "production"
        action: upsert

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"

  debug:
    verbosity: normal

  # Loki endpoint - update LOKI_ENDPOINT in Choreo env config
  # Choreo internal URL format: http://<project>--<component>--<endpoint>.<namespace>:3100
  otlp_http:
    endpoint: http://loki-706767408:3100/

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [resource]
      exporters: [prometheus, debug]

    logs:
      receivers: [otlp]
      processors: [resource]
      exporters: [debug, otlphttp]
