schemaVersion: 1.2

endpoints:
  - name: grafana
    displayName: Grafana Dashboard
    type: REST
    service:
      basePath: /
      port: 3000
    networkVisibilities:
      - Organization
      - Public
  
  - name: OTLPgRPCReceiver
    displayName: OTLP gRPC Receiver
    type: GRPC
    service:
      basePath: /
      port: 4317
    networkVisibilities:
      - Organization
      - Public
  
  - name: OTLPHTTPReceiver
    displayName: OTLP HTTP Receiver
    type: REST
    service:
      basePath: /
      port: 4318
    networkVisibilities:
      - Organization
      - Public